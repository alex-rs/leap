name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: npm install -g bats

      - name: Run tests
        run: bats tests/

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck on CLI scripts
        run: |
          shellcheck bin/leap lib/utils.sh lib/config.sh lib/init.sh lib/agents.sh
