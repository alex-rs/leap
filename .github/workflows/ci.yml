name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats
          sudo /tmp/bats/install.sh /usr/local

      - name: Configure git identity for tests
        run: |
          git config --global user.email "ci@test.local"
          git config --global user.name "CI"

      - name: Run tests
        run: bats tests/

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck on CLI scripts
        run: shellcheck leap lib/utils.sh lib/config.sh lib/init.sh lib/agents.sh
